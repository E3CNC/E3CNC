name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli/go
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: cli/go/go.sum

      - name: Run Go tests
        run: go test ./... -count=1 -short

      - name: Check Go build
        run: |
          CGO_ENABLED=0 go build -o /dev/null ./cmd/e3cnc-tui/
          echo "Go build OK"

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Run linter
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Verify critical assets exist
        run: |
          echo "=== Asset sizes ==="
          ls -lhS dist/assets/*.js | head -10
          echo ""
          echo "=== Chunk verification ==="
          for chunk in "Viewer" "vuetify" "vue-core" "index"; do
            file=$(ls dist/assets/${chunk}-*.js 2>/dev/null | head -1)
            if [ -n "$file" ]; then
              size=$(stat -c%s "$file")
              echo "  ✅ ${chunk}: $(numfmt --to=iec $size)"
            else
              echo "  ❌ ${chunk}: MISSING"
            fi
          done
