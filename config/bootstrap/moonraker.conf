# E3CNC moonraker.conf — bootstrap template
# Placeholders are filled in by e3cnc-tui when creating a new instance.
# This template produces a clean, minimal config with no duplicate sections.

[server]
host: 0.0.0.0
port: {port}
klippy_uds_address: {klippy_uds_address}

# e3cnc_web_port: {web_port}

[file_manager]
config_path: {config_path}

[database]
database_path: {database_path}

[authorization]
cors_domains:
    *
trusted_clients:
    127.0.0.1
    ::1

[cnc_agent]

[cnc_metadata]
extractor_path: {extractor_path}
timeout: 30.0
