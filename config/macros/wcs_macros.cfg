# WCS macros — coordinate system selection and zeroing.
# Requires [work_coordinate_systems] in printer.cfg.

[gcode_macro WCS_1]
description: Activate Coordinate System 1 (G54)
gcode:
  G54                         ; Select WCS slot 1 (default work coordinate system)

[gcode_macro WCS_2]
description: Activate Coordinate System 2 (G55)
gcode:
  G55                         ; Select WCS slot 2

[gcode_macro WCS_3]
description: Activate Coordinate System 3 (G56)
gcode:
  G56                         ; Select WCS slot 3

[gcode_macro WCS_4]
description: Activate Coordinate System 4 (G57)
gcode:
  G57                         ; Select WCS slot 4

[gcode_macro WCS_5]
description: Activate Coordinate System 5 (G58)
gcode:
  G58                         ; Select WCS slot 5

[gcode_macro WCS_6]
description: Activate Coordinate System 6 (G59)
gcode:
  G59                         ; Select WCS slot 6

[gcode_macro MACHINE_COORDS]
description: Switch to raw machine coordinates (G53)
gcode:
  G53                         ; Switch to machine coordinate system (ignores all WCS offsets)

[gcode_macro ZERO_X]
description: Zero X in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} X0   ; Set X=0 in the currently active WCS slot

[gcode_macro ZERO_Y]
description: Zero Y in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} Y0   ; Set Y=0 in the currently active WCS slot

[gcode_macro ZERO_Z]
description: Zero Z in the active WCS
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} Z0   ; Set Z=0 in the currently active WCS slot

[gcode_macro ZERO_ALL]
description: Zero X, Y and Z in the active WCS, then show full WCS status
gcode:
  G10 L20 P{printer.work_coordinate_systems.active_p} X0 Y0 Z0  ; Zero all axes in the active WCS slot
  WCS_STATUS                                                     ; Display current WCS state on console
