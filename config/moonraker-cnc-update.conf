# Moonraker update_manager entry for E3CNC UI fork
# Add to your moonraker.conf or include via: [include E3CNC-update.conf]
#
# The post_update_script is an actual executable that runs after git pull.
# scripts/post_update.sh handles frontend rebuild, agent re-vendor, and
# Klipper plugin re-deploy automatically.

[update_manager E3CNC]
type: git_repo
channel: dev
path: ~/E3CNC
origin: https://github.com/E3CNC/E3CNC.git
primary_branch: main
enable_node_updates: False
is_system_service: False
post_update_script: ~/E3CNC/scripts/post_update.sh
managed_services: klipper moonraker
refresh_interval: 24
