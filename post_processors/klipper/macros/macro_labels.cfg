# MPCNC Macro Organization - UI Display Config
# This file uses macro descriptions to organize macros in Fluidd/Mainsail UI
# Fluidd groups macros by their "description" prefix.
# These macros do NOT move axes — they only set UI group labels via M118.

[gcode_macro _SPINDLE_LABEL]
description: 🔄 Spindle Control
gcode:
  M118 Spindle Control Group     ; Create UI group label for spindle macros in Fluidd/Mainsail

[gcode_macro _COOLANT_LABEL]
description: 💧 Coolant Control
gcode:
  M118 Coolant Control Group      ; Create UI group label for coolant macros

[gcode_macro _PAUSE_LABEL]
description: ⏸️ Pause/Resume
gcode:
  M118 Pause/Resume Group         ; Create UI group label for pause/resume macros

[gcode_macro _PRINT_LABEL]
description: 📄 Print Lifecycle
gcode:
  M118 Print Lifecycle Group       ; Create UI group label for print lifecycle macros

[gcode_macro _COORD_LABEL]
description: 📍 Coordinate Systems
gcode:
  M118 Coordinate Systems Group    ; Create UI group label for WCS macros

[gcode_macro _OFFSET_LABEL]
description: 🎯 Origin/Offset
gcode:
  M118 Origin/Offset Group         ; Create UI group label for zero/origin macros

[gcode_macro _UTILITY_LABEL]
description: 🛠️ Utility Macros
gcode:
  M118 Utility Macros Group        ; Create UI group label for utility macros

[gcode_macro _SYSTEM_LABEL]
description: ⚙️ System
gcode:
  M118 System Group                ; Create UI group label for system macros
