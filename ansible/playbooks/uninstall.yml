---
- name: Uninstall E3CNC — reverse of install.yml
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  tasks:
    - name: Remove cnc_metadata_extractor.py from E3CNC instance
      ansible.builtin.file:
        path: '{{ printer_data.scripts_dir }}/cnc_metadata_extractor.py'
        state: absent

    - name: Remove [cnc_agent] section header from E3CNC instance moonraker.conf
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        line: '[cnc_agent]'
        state: absent

    - name: Remove extractor_path from [cnc_metadata] in E3CNC instance moonraker.conf
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        regexp: '^extractor_path:'
        state: absent

    - name: Remove timeout from [cnc_metadata] in E3CNC instance moonraker.conf
      ansible.builtin.lineinfile:
        path: '{{ moonraker_conf }}'
        regexp: '^timeout:'
        state: absent

    - name: Remove E3CNC macros/config directory from instance
      ansible.builtin.file:
        path: '{{ printer_data.E3CNC_dir }}'
        state: absent
      ignore_errors: true

    - name: Remove nginx site for E3CNC
      ansible.builtin.file:
        path: '{{ item.path }}'
        state: absent
      loop:
        - path: '/etc/nginx/sites-available/{{ bootstrap_nginx_site_name }}'
        - path: '/etc/nginx/sites-enabled/{{ bootstrap_nginx_site_name }}'
      become: true
      ignore_errors: true

    - name: Remove Avahi mDNS publisher for E3CNC
      ansible.builtin.file:
        path: /etc/systemd/system/avahi-publish-e3cnc.service
        state: absent
      become: true
      ignore_errors: true

    - name: Remove E3CNC frontend web roots
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - '{{ frontend.web_root }}'
      ignore_errors: true

    - name: Remove E3CNC instance directory
      ansible.builtin.file:
        path: '{{ e3cnc_root }}'
        state: absent
      ignore_errors: true

    - name: Remove nginx and Avahi systemd files
      ansible.builtin.file:
        path: '{{ item }}'
        state: absent
      loop:
        - /etc/nginx/sites-available/e3cnc-*
        - /etc/nginx/sites-enabled/e3cnc-*
        - /etc/systemd/system/avahi-publish-e3cnc.service
        - /etc/supervisor/conf.d/e3cnc-*.conf
      become: true
      ignore_errors: true
