---
- name: Install E3CNC — agent, frontend, plugins
  hosts: cnc
  gather_facts: true
  vars_files:
    - ../vars/main.yml
  pre_tasks:
    - name: Ensure nginx is installed
      ansible.builtin.apt:
        name: nginx
        state: present
        update_cache: true
      become: true

    - name: Clone or update monorepo on the target
      ansible.builtin.git:
        repo: '{{ repo.url }}'
        dest: '{{ repo.dest }}'
        version: '{{ repo.branch }}'
        force: true
      register: repo_clone
  roles:
    - role: bootstrap-stack
      tags: [bootstrap, bootstrap-stack]
    - role: extractor
      tags: [extractor]
    - role: moonraker-config
      tags: [moonraker-config]
    - role: macros
      tags: [macros]
    - role: frontend
      tags: [frontend]
  post_tasks:
    - name: Restart moonraker
      ansible.builtin.systemd:
        name: '{{ moonraker_service }}'
        state: restarted
      become: true
      when: not (bootstrap_skip_runtime_verification | default(false) | bool)
      tags:
        - restart-services

    - name: Wait for moonraker API to respond
      ansible.builtin.uri:
        url: 'http://127.0.0.1:{{ moonraker_port }}/printer/info'
        method: GET
      register: moonraker_api
      retries: 30
      delay: 1
      until: moonraker_api.status == 200
      when: not (bootstrap_skip_runtime_verification | default(false) | bool)
      tags:
        - restart-services

    - name: Verify Klippy reports ready
      ansible.builtin.uri:
        url: 'http://127.0.0.1:{{ moonraker_port }}/printer/info'
        method: GET
      register: klippy_info
      retries: 20
      delay: 3
      until: klippy_info.json is defined and klippy_info.json.result.state == 'ready'
      when:
        - not (bootstrap_skip_runtime_verification | default(false) | bool)
        - not (e3cnc_skip_klippy_ready_check | default(false))
      tags:
        - restart-services

    - name: Skip Klippy readiness gate when bootstrap created a placeholder printer.cfg
      ansible.builtin.debug:
        msg: 'Skipping Klippy ready check for this install because the fresh-bootstrap path created a placeholder printer.cfg.'
      when:
        - not (bootstrap_skip_runtime_verification | default(false) | bool)
        - e3cnc_skip_klippy_ready_check | default(false)
      tags:
        - restart-services

    - name: Verify CncAgent loaded in moonraker logs
      ansible.builtin.shell:
        cmd: |
          journalctl -u {{ moonraker_service }} --since "2 minutes ago" --no-pager 2>/dev/null \
            || tail -200 {{ printer_data.config_dir }}/../logs/moonraker.log 2>/dev/null \
            || true
        warn: false
      register: agent_logs
      changed_when: false
      failed_when: false
      when: not (bootstrap_skip_runtime_verification | default(false) | bool)
      tags:
        - restart-services

    - name: Skip runtime verification for bootstrap integration environments
      ansible.builtin.debug:
        msg: 'Skipping Moonraker/Klipper runtime verification because bootstrap_skip_runtime_verification=true.'
      when: bootstrap_skip_runtime_verification | default(false) | bool
      tags:
        - restart-services
