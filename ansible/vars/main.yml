---
repo:
  url: https://github.com/E3CNC/E3CNC_UI.git
  dest: '{{ ansible_env.HOME }}/E3CNC_UI'
  branch: main

# Instance-specific paths — overridden via CLI extra_vars for multi-instance.
# Default to standard single-instance paths for a default install.
printer_data_dir: '{{ ansible_env.HOME }}/printer_data'
moonraker_dir: '{{ ansible_env.HOME }}/moonraker'
klipper_dir: '{{ ansible_env.HOME }}/klipper'
frontend_web_root: '{{ ansible_env.HOME }}/mainsail'
moonraker_service: 'moonraker'
klipper_service: 'klipper'
moonraker_port: 7125

frontend:
  web_root: '{{ frontend_web_root }}'

agent:
  vender_dir: '{{ moonraker_dir }}/moonraker/components'
  source_dir: '{{ repo.dest }}/E3CNC/moonraker-mcp/src/moonraker_mcp'

klipper:
  extras_dir: '{{ klipper_dir }}/klippy/extras'

printer_data:
  config_dir: '{{ printer_data_dir }}/config'
  E3CNC_dir: '{{ printer_data_dir }}/config/E3CNC'
  scripts_dir: '{{ printer_data_dir }}/scripts'
  macros_dir: '{{ printer_data_dir }}/config/macros'
  printer_cfg: '{{ printer_data_dir }}/config/printer.cfg'

moonraker_conf: '{{ printer_data_dir }}/config/moonraker.conf'
