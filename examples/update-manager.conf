# E3CNC UI update-manager snippet for Moonraker
# ------------------------------------------------------------
# Add this block to your moonraker.conf (~/printer_data/config/moonraker.conf)
# to register E3CNC with Moonraker's update manager.
#
# No manual clone needed — Moonraker will clone the repo automatically
# when you trigger the first update. Just add this block, restart Moonraker,
# then go to Machine -> Update Manager and click Update.
#
# Replace ~/E3CNC with an absolute path if needed (e.g. /home/pi/E3CNC).
# ------------------------------------------------------------

[update_manager E3CNC]
type: git_repo
channel: dev
path: ~/E3CNC
origin: https://github.com/E3CNC/E3CNC.git
primary_branch: main
enable_node_updates: False
is_system_service: False
post_update_script: ~/E3CNC/scripts/post_update.sh
info_tags:
    desc=E3CNC UI
managed_services: klipper moonraker
refresh_interval: 24
