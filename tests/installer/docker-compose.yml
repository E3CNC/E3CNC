# E3CNC Installer Test Matrix (amd64 only)
# For arm64 testing: use real BTT-CB1 hardware via SSH (make test-cb1)
# Usage:
#   docker compose build          # Build all images
#   docker compose up             # Run all tests
#   docker compose up ubuntu     # Run single test
#   docker compose down           # Clean up

services:
  ubuntu:
    build:
      context: ../..
      dockerfile: tests/installer/Dockerfile.ubuntu
    platform: linux/amd64
    container_name: e3cnc-test-ubuntu
    hostname: e3cnc-ubuntu
    volumes:
      - ../../tests/installer/test-runner.sh:/workspace/test-runner.sh
    command: ["bash", "-c", "/workspace/test-runner.sh ubuntu"]
    networks:
      - installer-test

  fedora:
    build:
      context: ../..
      dockerfile: tests/installer/Dockerfile.fedora
    platform: linux/amd64
    container_name: e3cnc-test-fedora
    hostname: e3cnc-fedora
    volumes:
      - ../../tests/installer/test-runner.sh:/workspace/test-runner.sh
    command: ["bash", "-c", "/workspace/test-runner.sh fedora"]
    networks:
      - installer-test

  rocky:
    build:
      context: ../..
      dockerfile: tests/installer/Dockerfile.rocky
    platform: linux/amd64
    container_name: e3cnc-test-rocky
    hostname: e3cnc-rocky
    volumes:
      - ../../tests/installer/test-runner.sh:/workspace/test-runner.sh
    command: ["bash", "-c", "/workspace/test-runner.sh rocky"]
    networks:
      - installer-test

networks:
  installer-test:
    driver: bridge
